name: FIFA 2026 ETL Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

jobs:
  etl-pipeline:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------------------
      # 1. Checkout repository
      # -------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # 2. Authenticate to GCP via Workload Identity Federation
      #    No JSON key required — keyless auth via OIDC
      # -------------------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/922835179930/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: pipeline-sa@project-58697c8a-e1d7-45ec-a17.iam.gserviceaccount.com

      # -------------------------------------------------------------------
      # 3. Set up R environment
      # -------------------------------------------------------------------
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'

      # -------------------------------------------------------------------
      # 4. Cache R packages
      # -------------------------------------------------------------------
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-

      # -------------------------------------------------------------------
      # 5. Install R dependencies
      # -------------------------------------------------------------------
      - name: Install R packages
        run: |
          install.packages(c(
            "tidyverse", "ggplot2", "corrplot", "FactoMineR", "factoextra",
            "gridExtra", "scales", "ggtext", "ggrepel", "caret", "glmnet",
            "MASS", "googleCloudStorageR"
          ))
        shell: Rscript {0}

      # -------------------------------------------------------------------
      # 6. Run ETL Pipeline
      # -------------------------------------------------------------------
      - name: Run ETL Pipeline
        run: |
          setwd("src")
          source("00_etl_pipeline.R")
        shell: Rscript {0}

      # -------------------------------------------------------------------
      # 7. Run Data Prep
      # -------------------------------------------------------------------
      - name: Run Data Preparation
        run: |
          setwd("src")
          source("00_etl_pipeline.R")
          source("01_data_prep.R")
        shell: Rscript {0}