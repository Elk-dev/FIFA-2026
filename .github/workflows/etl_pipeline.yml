name: FIFA 2026 ETL Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  etl-pipeline:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/922835179930/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: pipeline-sa@project-58697c8a-e1d7-45ec-a17.iam.gserviceaccount.com

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-packages-v1
          restore-keys: ${{ runner.os }}-r-packages-

      - name: Install R packages
        run: |
          .libPaths(c(.libPaths(), Sys.getenv("R_LIBS_USER")))
          install.packages(c(
            "tidyverse", "ggplot2", "corrplot", "FactoMineR", "factoextra",
            "gridExtra", "scales", "ggtext", "ggrepel", "caret", "glmnet",
            "MASS", "googleCloudStorageR"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run ETL Pipeline
        run: |
          .libPaths(c(.libPaths(), Sys.getenv("R_LIBS_USER")))
          setwd("src")
          source("00_etl_pipeline.R")
        shell: Rscript {0}

      - name: Run Data Preparation
        run: |
          .libPaths(c(.libPaths(), Sys.getenv("R_LIBS_USER")))
          setwd("src")
          source("00_etl_pipeline.R")
          source("01_data_prep.R")
        shell: Rscript {0}